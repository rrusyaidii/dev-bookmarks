<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DevMark Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        background: #0f1117;
        color: #e2e4ea;
        max-width: 480px;
        margin: 40px auto;
        padding: 0 20px;
      }
      h1 {
        font-size: 20px;
        color: #61dafb;
      }
      label {
        display: block;
        font-size: 13px;
        margin-bottom: 6px;
        color: #8b8fa3;
      }
      input {
        width: 100%;
        height: 36px;
        border-radius: 10px;
        border: 1px solid #2a2d3a;
        background: #181b22;
        color: #e2e4ea;
        padding: 0 12px;
        box-sizing: border-box;
      }
      button {
        margin-top: 14px;
        height: 36px;
        padding: 0 16px;
        border: none;
        border-radius: 10px;
        background: rgba(97, 218, 251, 0.15);
        color: #61dafb;
        font-weight: 600;
        cursor: pointer;
      }
      #status {
        margin-top: 10px;
        font-size: 12px;
        color: #34d399;
      }
    </style>
  </head>
  <body>
    <h1>DevMark Settings</h1>
    <label for="apiBase">API base URL</label>
    <input id="apiBase" type="url" placeholder="http://localhost:3000" />
    <button id="save" type="button">Save</button>
    <p id="status"></p>
    <script src="options.js"></script>
  </body>
</html>
